      <h1>SAR Platform — Real-Time Aircraft Tracking &amp; AI Search and Rescue Intelligence</h1>
      <p>SAR Platform is a professional aviation monitoring and Search &amp; Rescue intelligence system. It tracks live aircraft worldwide using ADS-B transponder data from OpenSky Network, applies AI-powered crash prediction via Google Gemini 3 Flash, integrates live weather from Open-Meteo, supports ELT signal triangulation on 121.5 MHz and 406 MHz, and sends automated Gmail emergency alerts for CRITICAL and HIGH-risk aircraft. Built for SAR mission operators, aviation researchers, and aviation enthusiasts in India and worldwide.</p>

      <div class="s">
        <h2>Core Features</h2>
        <ul>
          <li><strong>Global ADS-B Aircraft Tracking</strong> — Real-time aircraft positions via OpenSky Network API, refreshed every 25 seconds. Interactive Leaflet map with risk-colored aircraft icons. Scan radius: 500 km, 1,000 km, 2,000 km, or Global worldwide coverage.</li>
          <li><strong>AI Crash Prediction Engine</strong> — Powered by Google Gemini 3 Flash. Analyses real-time telemetry, wind drift, kinematics, and weather data to generate a full tactical SAR report: crash probability, predicted impact zone coordinates, recommended search sectors.</li>
          <li><strong>Automated Danger Assessment</strong> — Every tracked aircraft is scored in real time across altitude, descent rate, airspeed near stall, and adverse weather. CRITICAL and HIGH-risk aircraft automatically trigger Gmail alerts with full risk breakdown and GPS coordinates.</li>
          <li><strong>Live Weather Fusion</strong> — Open-Meteo weather data overlaid on the SAR map every 7 minutes: wind speed, wind direction, visibility, WMO weather code, dangerous condition detection.</li>
          <li><strong>ELT Signal Triangulation</strong> — Emergency Locator Transmitter bearing lines from up to 5 ground stations on 121.5 MHz or 406 MHz. Triangulated crash position drawn on the interactive map.</li>
          <li><strong>Historical Data and Analytics</strong> — Cloud-stored aircraft history, weather snapshots, and risk assessments. Configurable rolling-window retention (6 hours to 7 days). CSV export for post-incident analysis.</li>
          <li><strong>Kinematic Simulation</strong> — Physics engine animates predicted flight path using vector kinematics, heading, velocity, vertical rate, and wind drift. Uncertainty cone expands with time.</li>
          <li><strong>Role-Based Access Control</strong> — Host (full platform, global scan, alert controls), Subscriber (AI prediction, 1,000 km scan, danger assessment), Free Viewer (read-only map and weather).</li>
          <li><strong>Automated Gmail Alerts</strong> — HTML email alerts sent immediately when aircraft reach CRITICAL or HIGH danger level. Works whether host is online or offline.</li>
          <li><strong>Crash Monitor Edge Function</strong> — Background server-side monitoring checks OpenSky for extreme descent parameters and sudden signal loss — sends Gmail alert immediately on detection.</li>
        </ul>
      </div>

      <div class="s">
        <h2>How SAR Platform Works</h2>
        <p><strong>Step 1 — Data Ingestion:</strong> OpenSky Network provides raw ADS-B transponder data. A server-side edge proxy fetches aircraft positions, altitude, heading, and velocity every 25 seconds handling CORS and rate limiting.</p>
        <p><strong>Step 2 — Physics and Risk Analysis:</strong> Each aircraft passes through a physics engine computing kinematic state: glide ratio, descent rate, wind-adjusted trajectory. A danger scorer checks altitude, speed, vertical rate, weather, and terrain. CRITICAL and HIGH aircraft trigger immediate alerts.</p>
        <p><strong>Step 3 — AI Prediction Report:</strong> Select any aircraft and the platform sends telemetry, physics output, and weather data to Google Gemini 3 Flash. The AI returns a structured SAR report: risk assessment, predicted impact coordinates, search radius, and recommended rescue strategy.</p>
        <p><strong>Step 4 — Alert and Response:</strong> Gmail alerts are sent automatically with full aircraft details, risk table, GPS coordinates, and factors. Operators use the map, timeline, and resource table to coordinate ground and air SAR teams.</p>
      </div>

      <div class="s">
        <h2>Access Plans and Pricing</h2>
        <ul>
          <li><strong>Free View (Free)</strong> — Interactive live map, real-time weather overlay, no subscription needed. Email OTP verification only. Contact us for the access password.</li>
          <li><strong>Subscriber (Paid)</strong> — Live aircraft feed up to 1,000 km radius, AI crash prediction reports via Google Gemini, danger assessment panel, live weather with aircraft overlay, 30-day rolling access. Login via email OTP — no password to remember.</li>
          <li><strong>Host (Full Access)</strong> — Complete platform: global ADS-B scan, subscriber access manager, automated alert controls, history dashboard with CSV export, ELT triangulation panel, mission input, data retention configuration, crash monitor.</li>
        </ul>
        <p>To subscribe: Pay via UPI (anands9408@oksbi) and email <a href="mailto:anands9408@gmail.com">anands9408@gmail.com</a> with your email address. Access is added within 24 hours.</p>
      </div>

      <div class="s">
        <h2>Frequently Asked Questions</h2>
        <p><strong>What data sources does SAR Platform use?</strong><br/>Aircraft tracking uses the OpenSky Network public ADS-B API (opensky-network.org). Weather comes from Open-Meteo (open-meteo.com). AI prediction uses Google Gemini 3 Flash. Data is stored in a cloud PostgreSQL database.</p>
        <p><strong>Is SAR Platform free?</strong><br/>Yes — Free View mode provides read-only map and weather access without any subscription. Full AI prediction and live aircraft tracking require a paid subscriber plan.</p>
        <p><strong>How do I subscribe?</strong><br/>Send payment via UPI to anands9408@oksbi and email anands9408@gmail.com with your email address. Subscriber access is added within 24 hours and is valid for 30 days.</p>
        <p><strong>What is ADS-B?</strong><br/>ADS-B (Automatic Dependent Surveillance–Broadcast) is the global aviation standard where aircraft continuously broadcast their GPS position, altitude, speed, and heading to ground receivers and satellites. SAR Platform uses this public data via OpenSky Network.</p>
        <p><strong>What is ELT triangulation?</strong><br/>Emergency Locator Transmitters broadcast distress signals on 121.5 MHz or 406 MHz when an aircraft crashes. SAR Platform lets operators log signal bearings from multiple ground stations and triangulates the intersection point to estimate crash location on the map.</p>
        <p><strong>Is SAR Platform certified for operational use?</strong><br/>SAR Platform is a research-grade prototype using public APIs. It is designed for situational awareness, training, and research purposes only. Always defer to official aviation authorities (DGCA, AAI) and certified SAR systems for operational emergency decisions.</p>
        <p><strong>Which countries does SAR Platform cover?</strong><br/>SAR Platform can track aircraft worldwide through the OpenSky Network global ADS-B receiver network. Coverage is strongest in India, Europe, North America, and Australia where ground receiver density is highest.</p>
      </div>
